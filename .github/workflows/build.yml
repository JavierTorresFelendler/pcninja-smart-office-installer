name: Build

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*-rc*"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        shell: pwsh
        run: dotnet build .\PcNinja.SmartOfficeInstaller.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfficeSmart-build
          path: bin\Release\net48\OfficeSmart-v*.exe
